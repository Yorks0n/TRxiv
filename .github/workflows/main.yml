## main.yml
name: 'TRxiv update'

# 触发条件
## 条件1，代码push进仓库
## 条件2，定时任务，在UTC 10和22点，即北京时间18点和6点运行
on:
  push:
  schedule:
    - cron: '0 10,22 * * *'

jobs:
  TRxiv_update_job:
    runs-on: ubuntu-latest
    name: Update the csv file
    steps: 
      - name: 'run script'
        uses: Yorks0n/TRxiv@main
      
      - name: Commit files
      run: |
         git config --local user.email ${{ secrets.MY_EMAIL }}
         git config --local user.name "Yorks0n"
         git pull
         git add README.md
         git add data.csv
         git commit -m "update data.csv"
      shell: bash

      - name: Push changes
      uses:  ad-m/github-push-action@master
      with:
         github_token: ${{ secrets.MY_GIT_TOKEN }}
         branch: main
